version: '3.8'
services:
  app:
    build: .
    ports:
      - "3000:3000"
    volumes:
      - spotybox_data:/data
    environment:
      - DATABASE_PATH=/data/db.sqlite
      - NODE_ENV=production
      # Copy remaining vars from .env manually or use env_file
    env_file:
      - .env

volumes:
  spotybox_data:
